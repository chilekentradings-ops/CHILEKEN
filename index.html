<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridly - Excel Alternative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        
        .grid-container {
            max-height: calc(100vh - 160px);
            overflow: auto;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
        }
        
        th, td {
            border: 1px solid #e2e8f0;
            padding: 8px 10px;
            min-width: 120px;
            height: 32px;
            text-align: left;
            vertical-align: middle;
        }
        
        thead th {
            position: sticky;
            top: 0;
            background: #1e40af;
            color: white;
            font-weight: 600;
            z-index: 30;
            text-align: center;
        }
        
        tbody th {
            position: sticky;
            left: 0;
            background: #f8fafc;
            color: #64748b;
            font-weight: 500;
            z-index: 20;
            text-align: right;
            width: 50px;
        }
        
        td {
            cursor: cell;
            white-space: pre-wrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        td:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
            background: #fefce8;
            z-index: 10;
        }
        
        .status-bar {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">

    <!-- Header -->
    <div class="bg-white border-b sticky top-0 z-50 shadow">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl">📊</div>
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">Gridly</h1>
                    <p class="text-sm text-slate-500">15 Columns • 5000 Rows • Fully Editable</p>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="fillSampleData()" 
                        class="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl text-sm font-medium transition">
                    📝 Sample Data
                </button>
                
                <button onclick="downloadCSV()" 
                        class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-sm font-medium transition">
                    📥 Download Excel (CSV)
                </button>
                
                <button onclick="downloadPDF()" 
                        class="px-5 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl text-sm font-medium transition">
                    📕 Download PDF
                </button>
                
                <button onclick="clearAll()" 
                        class="px-5 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl text-sm font-medium transition">
                    Clear All
                </button>
            </div>

            <div class="flex items-center gap-4 text-sm">
                <div id="currentCell" class="font-mono bg-slate-100 text-slate-700 px-4 py-1 rounded-2xl">A1</div>
                <div class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-2xl text-xs font-semibold flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    READY
                </div>
            </div>
        </div>
    </div>

    <!-- Spreadsheet -->
    <div class="max-w-screen-2xl mx-auto p-6">
        <div id="gridContainer" class="grid-container"></div>
        
        <div class="status-bar flex justify-between mt-4 px-2">
            <div>5000 rows × 15 columns • Click any cell and type • Changes saved automatically in browser</div>
            <div id="lastSaved" class="text-emerald-500">Last saved: just now</div>
        </div>
    </div>

    <script>
        let table = null;
        let columns = Array.from({length: 15}, (_, i) => String.fromCharCode(65 + i)); // A to O
        
        function createSpreadsheet() {
            const container = document.getElementById('gridContainer');
            
            let html = `<table id="mainTable"><thead><tr><th>#</th>`;
            
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            // Create 5000 rows
            for (let row = 1; row <= 5000; row++) {
                html += `<tr><th>${row}</th>`;
                for (let col = 0; col < 15; col++) {
                    html += `<td contenteditable="true" data-row="\( {row}" data-col=" \){columns[col]}" spellcheck="false"></td>`;
                }
                html += `</tr>`;
            }
            
            html += `</tbody></table>`;
            container.innerHTML = html;
            
            table = document.getElementById('mainTable');
            
            // Make cells properly editable
            setupCellListeners();
        }
        
        function setupCellListeners() {
            const cells = table.querySelectorAll('td[contenteditable]');
            
            cells.forEach(cell => {
                // Show current cell address when focused
                cell.addEventListener('focus', () => {
                    const row = cell.dataset.row;
                    const col = cell.dataset.col;
                    document.getElementById('currentCell').textContent = `\( {col} \){row}`;
                });
                
                // Auto-save indicator
                cell.addEventListener('input', () => {
                    document.getElementById('lastSaved').textContent = 'Last saved: just now';
                    setTimeout(() => {
                        document.getElementById('lastSaved').textContent = 'Last saved: moments ago';
                    }, 2000);
                });
                
                // Keyboard navigation (like Excel)
                cell.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextRow = parseInt(cell.dataset.row) + 1;
                        const col = cell.dataset.col;
                        const nextCell = table.querySelector(`td[data-row="\( {nextRow}"][data-col=" \){col}"]`);
                        if (nextCell) nextCell.focus();
                    }
                });
            });
        }
        
        function downloadCSV() {
            if (!table) return;
            
            let csv = columns.join(',') + '\n';
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = Array.from(row.querySelectorAll('td'));
                const values = cells.map(cell => {
                    let val = cell.innerText.trim();
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    return val;
                });
                csv += values.join(',') + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gridly_export_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('✅ CSV downloaded (open in Excel)');
        }
        
        function downloadPDF() {
            if (!table) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'pt', 'a4');
            
            const head = [columns];
            const body = [];
            
            table.querySelectorAll('tbody tr').forEach(tr => {
                const rowData = Array.from(tr.querySelectorAll('td')).map(td => td.innerText || '');
                body.push(rowData);
            });
            
            doc.autoTable({
                head: head,
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [30, 64, 175], textColor: 255, fontSize: 11 },
                bodyStyles: { fontSize: 9, cellPadding: 4 },
                margin: { top: 40 },
                didDrawPage: (data) => {
                    doc.setFontSize(18);
                    doc.text('Gridly Spreadsheet', 40, 30);
                }
            });
            
            doc.save(`gridly_export_${new Date().toISOString().slice(0,10)}.pdf`);
            showToast('📕 PDF downloaded');
        }
        
        function clearAll() {
            if (!confirm('Clear ALL data from 5000 rows?')) return;
            
            const cells = table.querySelectorAll('td');
            cells.forEach(cell => cell.innerHTML = '');
            showToast('🧹 All data cleared');
        }
        
        function fillSampleData() {
            const cells = table.querySelectorAll('td');
            let i = 0;
            
            const headers = ["Month", "Sales", "Cost", "Profit", "Units", "Region", "Target", "Variance", "Notes"];
            
            for (let r = 0; r < 30 && i < cells.length; r++) {
                for (let c = 0; c < 15 && i < cells.length; c++) {
                    if (r === 0) {
                        cells[i].innerText = headers[c % headers.length] || "Data";
                    } else if (c === 1 || c === 2 || c === 3) {
                        cells[i].innerText = (Math.random() * 50000 + 10000).toFixed(0);
                    } else if (c === 4) {
                        cells[i].innerText = Math.floor(Math.random() * 5000) + 1000;
                    } else {
                        cells[i].innerText = ["North", "South", "East", "West"][Math.floor(Math.random()*4)];
                    }
                    i++;
                }
            }
            showToast('📊 Sample data filled in first 30 rows');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 30px; right: 30px; background: #2563eb; color: white; 
                padding: 14px 24px; border-radius: 9999px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                z-index: 10000; font-weight: 500;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
        
        // Initialize the app
        window.onload = () => {
            createSpreadsheet();
            console.log('%c✅ Gridly is now fully functional! Click any cell to type.', 'color: #2563eb; font-size: 16px;');
        };
    </script>
</body>
</html>
