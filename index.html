<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel-like WebApp - Luckysheet (Most Complete Single-File Version)</title>
    
    <!-- Luckysheet CSS & JS (via CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/css/pluginsCss.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/plugins.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/css/luckysheet.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/assets/iconfont/iconfont.css">
    
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/luckysheet.umd.js"></script>

    <!-- SheetJS for better .xlsx export/import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; font-family: Arial, sans-serif; }
        #luckysheet { position: absolute; left: 0; right: 0; top: 40px; bottom: 0; }
        .topbar { background: #217346; color: white; padding: 8px 15px; font-size: 18px; display: flex; align-items: center; gap: 20px; }
        button { padding: 6px 12px; margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="topbar">
        <strong>My Excel-like WebApp</strong>
        <button onclick="luckysheet.exportToExcel()">📥 Export to .xlsx</button>
        <button onclick="exportToPDF()">📥 Export to PDF</button>
        <button onclick="addNewSheet()">+ New Sheet</button>
    </div>
    
    <div id="luckysheet"></div>

    <script>
        let luckysheetInstance;

        const options = {
            container: 'luckysheet',
            title: 'My Spreadsheet',
            lang: 'en',
            row: 100,          // initial rows
            column: 26,        // initial columns (A-Z)
            showtoolbar: true,
            showinfobar: true,
            showsheetbar: true,
            showstatisticBar: true,
            sheetFormulaBar: true,
            enableAddRow: true,
            enableAddColumn: true,
            enableInsertRow: true,
            enableInsertColumn: true,
            enableDeleteRow: true,
            enableDeleteColumn: true,
            allowEdit: true,
            allowCopy: true,
            allowPaste: true,
            showContextmenu: true,
            enableFormat: true,
            enableFormula: true,   // Real Excel formulas
            data: [{
                name: "Sheet1",
                color: "",
                status: 1,
                order: 0,
                row: 100,
                column: 26,
                data: [],   // Luckysheet will auto-fill empty grid
                celldata: [], 
                config: {}
            }],
            hook: {
                afterCreateSheet: function() {
                    console.log("New sheet created");
                }
            }
        };

        // Initialize Luckysheet
        window.onload = function() {
            luckysheetInstance = luckysheet.create(options);

            // Add demo data with formulas after load
            setTimeout(() => {
                // Set headers
                luckysheet.setcellvalue(0, 0, "Month", { sheetIndex: 0 });
                luckysheet.setcellvalue(0, 1, "Revenue", { sheetIndex: 0 });
                luckysheet.setcellvalue(0, 2, "Cost", { sheetIndex: 0 });
                luckysheet.setcellvalue(0, 3, "Profit", { sheetIndex: 0 });

                const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug"];
                for (let i = 0; i < months.length; i++) {
                    const r = i + 1;
                    luckysheet.setcellvalue(r, 0, months[i], { sheetIndex: 0 });
                    luckysheet.setcellvalue(r, 1, 50000 + i * 12000, { sheetIndex: 0 });
                    luckysheet.setcellvalue(r, 2, 28000 + i * 7000, { sheetIndex: 0 });
                    luckysheet.setcellvalue(r, 3, `=B\( {r+1}-C \){r+1}`, { sheetIndex: 0 }); // Real formula
                }

                // Example chart (select range first in UI or add via code)
                console.log("✅ Demo loaded. Double-click cells to edit. Type formulas like =SUM(B2:B9)");
            }, 800);
        };

        // Export to real Excel
        function luckysheet.exportToExcel() {
            luckysheet.exportExcel({
                filename: "my-excel-like-spreadsheet",
                fileType: "xlsx"
            });
        }

        // Basic PDF export (using jsPDF - add via CDN if needed)
        function exportToPDF() {
            const { jsPDF } = window.jspdf || {};
            if (!jsPDF) {
                alert("jsPDF not loaded. Add the CDN for full PDF support.");
                return;
            }
            const doc = new jsPDF();
            doc.text("Exported from Excel-like WebApp", 14, 20);
            doc.text("Open in real Excel for full features.", 14, 30);
            doc.save("spreadsheet-export.pdf");
        }

        function addNewSheet() {
            luckysheet.addSheet();
        }

        console.log("🚀 Excel-like app ready. Edit cells, use formulas, format, and export!");
    </script>
</body>
</html>
