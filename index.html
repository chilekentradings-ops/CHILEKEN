<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel-like WebApp - Handsontable + HyperFormula + Charts</title>
    
    <!-- Handsontable CSS & JS (Community edition) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    
    <!-- HyperFormula (advanced formulas) -->
    <script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- SheetJS for real Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background: #f5f5f5; }
        h1 { margin-bottom: 10px; }
        .container { display: flex; gap: 15px; flex-wrap: wrap; }
        #handsontable { flex: 2; min-width: 700px; background: white; border: 1px solid #ccc; }
        .sidebar { flex: 1; min-width: 380px; background: white; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .chart-container { position: relative; height: 380px; margin-top: 10px; }
        button { padding: 8px 14px; margin: 5px 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Real Excel-like WebApp <small>(Handsontable + HyperFormula + Live Charts)</small></h1>
    
    <div>
        <button onclick="exportToExcel()">📥 Download as Excel (.xlsx)</button>
        <button onclick="exportToPDF()">📥 Download as PDF</button>
        <button onclick="addRow()">+ Row</button>
        <button onclick="addColumn()">+ Column</button>
    </div>

    <div class="container">
        <div id="handsontable"></div>
        
        <div class="sidebar">
            <h3>Live Chart</h3>
            <select id="chartType" onchange="updateChart()">
                <option value="line">Line Chart</option>
                <option value="bar">Bar Chart</option>
                <option value="pie">Pie Chart</option>
            </select>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <small>Edit any cell → chart updates automatically</small>
        </div>
    </div>

    <script>
        // HyperFormula instance
        const hf = HyperFormula.buildEmpty({ licenseKey: 'gpl-v3' });

        // Handsontable instance
        const container = document.getElementById('handsontable');
        let hot = new Handsontable(container, {
            data: Handsontable.helper.createSpreadsheetData(20, 10), // 20 rows, 10 cols
            rowHeaders: true,
            colHeaders: true,
            contextMenu: true,
            manualRowMove: true,
            manualColumnMove: true,
            filters: true,
            dropdownMenu: true,
            formulas: {
                engine: HyperFormula,
                sheetName: 'Sheet1'
            },
            licenseKey: 'non-commercial-and-evaluation', // for testing
            afterChange: function() {
                updateChart();
            }
        });

        let currentChart = null;

        // Simple data for chart (Column A as labels, Column D as values - adjust as needed)
        function getChartData() {
            const data = hot.getData();
            const labels = [];
            const values = [];
            for (let i = 1; i < data.length; i++) { // skip header if any
                if (data[i][0]) labels.push(data[i][0]);
                const val = parseFloat(data[i][3]) || 0; // Column D (0-based index 3)
                values.push(val);
            }
            return { labels, values };
        }

        function updateChart() {
            const type = document.getElementById('chartType').value;
            const { labels, values } = getChartData();

            if (currentChart) currentChart.destroy();

            const ctx = document.getElementById('myChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels.length ? labels : ['A', 'B', 'C'],
                    datasets: [{
                        label: 'Values',
                        data: values.length ? values : [120, 190, 300],
                        backgroundColor: type === 'line' ? 'rgba(75,192,192,0.2)' : 
                                       ['#FF6384','#36A2EB','#FFCE56'],
                        borderColor: '#36A2EB',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: (type !== 'pie' && type !== 'doughnut') ? { y: { beginAtZero: true } } : {}
                }
            });
        }

        // Exports
        function exportToExcel() {
            const data = hot.getData();
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, "excel-like-spreadsheet.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Excel-like Spreadsheet Export", 14, 20);
            const data = hot.getData();
            let y = 30;
            data.forEach(row => {
                doc.text(row.join("   "), 14, y);
                y += 8;
                if (y > 280) { doc.addPage(); y = 30; }
            });
            doc.save("spreadsheet.pdf");
        }

        function addRow() { hot.alter('insert_row', hot.countRows()); }
        function addColumn() { hot.alter('insert_col', hot.countCols()); }

        // Initial demo data with formulas
        setTimeout(() => {
            // Headers
            hot.setDataAtCell(0, 0, "Month");
            hot.setDataAtCell(0, 1, "Revenue");
            hot.setDataAtCell(0, 2, "Expenses");
            hot.setDataAtCell(0, 3, "Profit");

            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul"];
            for (let i = 0; i < months.length; i++) {
                hot.setDataAtCell(i+1, 0, months[i]);
                hot.setDataAtCell(i+1, 1, 50000 + i*7000);
                hot.setDataAtCell(i+1, 2, 30000 + i*4000);
                hot.setDataAtCell(i+1, 3, `=B\( {i+2}-C \){i+2}`); // Real formula
            }

            updateChart();
        }, 300);

        console.log("✅ Real Excel-like experience loaded with Handsontable!");
    </script>
</body>
</html>
